# BothSafe production reverse proxy.
#
# Single Nginx container terminates TLS and fronts:
#   - /          → frontend (Next.js)
#   - /v1/*      → backend (NestJS)
#   - s3.<host>  → minio (object storage; signed URLs)
#
# TLS:
#   For real deployments wire certbot or place certs at /etc/nginx/certs/.
#   The server blocks below assume PEM files at:
#     /etc/nginx/certs/fullchain.pem
#     /etc/nginx/certs/privkey.pem
#   Until certs exist, run with HTTP only by commenting the 443 block.

worker_processes auto;
worker_rlimit_nofile 8192;

events {
  worker_connections 4096;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  server_tokens off;

  client_max_body_size 12m;   # payment / shipping proof uploads

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types
    text/plain text/css application/json application/javascript
    text/xml application/xml application/xml+rss text/javascript
    image/svg+xml;

  # ─── Rate limit zones ───────────────────────────────────────────────────────
  # Tighten public auth + invite endpoints; everything else uses the global
  # ThrottlerModule in NestJS.
  limit_req_zone $binary_remote_addr zone=auth:10m   rate=60r/m;
  limit_req_zone $binary_remote_addr zone=invite:10m rate=120r/m;

  # ─── Upstreams ──────────────────────────────────────────────────────────────
  # Names match the docker compose service names.
  upstream backend_upstream {
    server backend:3003;
    keepalive 32;
  }

  upstream frontend_upstream {
    server frontend:3000;
    keepalive 32;
  }

  upstream minio_upstream {
    server minio:9000;
    keepalive 32;
  }

  # X-Request-Id propagation
  map $http_x_request_id $req_id {
    default $http_x_request_id;
    ""      $request_id;
  }

  # ─── HTTP → HTTPS redirect ──────────────────────────────────────────────────
  server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ACME challenge for certbot.
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ─── Main HTTPS server ──────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Backend API.
    location /v1/ {
      proxy_pass http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-Id      $req_id;
      proxy_set_header Connection        "";
      proxy_read_timeout 60s;
    }

    # Tighter limits on sign-in / sign-up.
    location ~ ^/v1/auth/(login|signup|telegram|google) {
      limit_req zone=auth burst=20 nodelay;
      proxy_pass http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-Id      $req_id;
      proxy_set_header Connection        "";
    }

    # Tighter limits on the public invite preview endpoint.
    location ~ ^/v1/deals/[^/]+/invite-preview$ {
      limit_req zone=invite burst=40 nodelay;
      proxy_pass http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-Id      $req_id;
      proxy_set_header Connection        "";
    }

    # Frontend (Next.js).
    location / {
      proxy_pass http://frontend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-Id      $req_id;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        "upgrade";
      proxy_read_timeout 60s;
    }
  }

  # ─── MinIO subdomain (signed-URL downloads) ─────────────────────────────────
  # Point s3.<your-domain> at this server. Signed URLs from MinIO are bound to
  # the host they're issued for, so the backend must use this hostname when
  # generating them.
  server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name s3.*;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    client_max_body_size 200m;

    location / {
      proxy_pass http://minio_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection        "";

      # MinIO uses chunked transfer encoding for uploads.
      proxy_buffering off;
      proxy_request_buffering off;
    }
  }
}
